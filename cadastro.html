<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - JUPTI</title>
  <link rel="stylesheet" href="cadastro.css" />
</head>
<body>
  <div class="container">
    <!-- ✅ AJUSTE: Título igual ao da tela de login -->
    <h1>Bem-vindo ao <span class="brand">JUPTI</span></h1>

    <h2 style="font-size: 20px; margin-top: 20px;">Crie sua conta</h2>
    <p style="margin-bottom: 20px;">Preencha os dados abaixo para continuar.</p>

    <form id="formCadastro">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

      <label for="telefone">Telefone</label>
      <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>

      <label for="confirmar">Confirmar senha</label>
      <input type="password" id="confirmar" name="confirmar" placeholder="Repita a senha" required>

      <div class="erro" id="erroSenha" style="display:none;">As senhas não coincidem.</div>

      <div class="checkbox-container">
        <input type="checkbox" id="termos" name="termos" required>
        <label for="termos">Aceito os <a href="termos.html" target="_blank">Termos de Uso</a> e <a href="privacy.html" target="_blank">Política de Privacidade</a></label>
      </div>

      <button type="submit" class="btn">Cadastrar</button>
    </form>
  </div>

  <script src="cadastro.js"></script>
</body>
</html>
